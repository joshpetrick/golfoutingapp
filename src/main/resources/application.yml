spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/golfouting}
    username: ${DB_USER:golf}
    password: ${DB_PASSWORD:golf}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-123456}
  base-url: ${APP_BASE_URL:http://localhost:8080}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-signing-secret: ${STRIPE_WEBHOOK_SIGNING_SECRET:}
